<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotorCycle Portal | Login</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body, html {
            height: auto;
            overflow-y: auto;
        }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(29, 53, 87, 0.8), rgba(29, 53, 87, 0.8)), url('images/hero.png');
            background-size: cover;
            background-position: center;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            background: var(--bg-white);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-card h1 {
            margin-bottom: 2rem;
            color: var(--primary);
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }
        .auth-footer {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">&larr; Back to Home</a>

    
    <div class="auth-container">
        <div class="auth-card">
            <h1>Login</h1>
            <form>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="rider@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login to Portal</button>
            </form>
            <div class="auth-footer">
                <p>New rider? <a href="signup.html">Create an Account</a></p>
            </div>
        </div>
    </div>



    <script src="main.js"></script>
</body>
</html>
