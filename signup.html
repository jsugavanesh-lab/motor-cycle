<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotorCycle Portal | Sign Up</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body, html {
            height: auto;
            overflow-y: auto;
        }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(29, 53, 87, 0.8), rgba(29, 53, 87, 0.8)), url('images/road.png');
            background-size: cover;
            background-position: center;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            background: var(--bg-white);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .auth-card h1 {
            margin-bottom: 1.5rem;
            color: var(--primary);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            text-align: left;
        }
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        .form-group.full {
            grid-column: span 2;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }
        .auth-footer {
            margin-top: 1.2rem;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }
        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">&larr; Back to Home</a>

    
    <div class="auth-container">
        <div class="auth-card">
            <h1>Join the Club</h1>
            <form>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Doe" required>
                    </div>
                    <div class="form-group full">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="rider@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm">Confirm</label>
                        <input type="password" id="confirm" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>
            <div class="auth-footer">
                <p>Already a member? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>



    <script src="main.js"></script>
</body>
</html>
